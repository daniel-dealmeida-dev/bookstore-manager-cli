services:
  db:
    image: postgres:16-alpine
    container_name: bookstore-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    networks:
      - bookstore-net

networks:
  bookstore-net:
    driver: bridge

volumes:
  postgres_data: